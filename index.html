<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Link Markers</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="markerModal" class="modal">
        <div class="modal-content">

            <h3 id="modalTitle">Add Marker</h3>

            <div id="linksContainer"></div>

            <button id="addLinkBtn">
                + Add Link
            </button>

            <hr>

            <div class="modal-actions">
                <button id="saveMarkerBtn">
                    Save Marker
                </button>

                <button id="cancelMarkerBtn">
                    Cancel
                </button>
            </div>

        </div>
    </div>

<div class="search-controls">

    <input
        type="number"
        id="latitudeInput"
        placeholder="Latitude"
        step="any">

    <input
        type="number"
        id="longitudeInput"
        placeholder="Longitude"
        step="any">

    <button id="goToCoordinatesBtn">
        Go
    </button>

</div>
	
	<div class="storage-actions">
    <button id="exportMarkersBtn">
        Export
    </button>

    <button id="importMarkersBtn">
        Import
    </button>

    <input
        type="file"
        id="importMarkersInput"
        accept=".json,application/json"
        hidden
    >
</div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="script.js"></script>

</body>
</html>
